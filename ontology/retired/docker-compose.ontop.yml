# Overlay: adds the Ontop SPARQL endpoint sidecar to the main docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ontop.yml up -d
#
# Prerequisites:
#   - The main docker-compose.yml stack is healthy (Neo4j on Bolt :7687)
#   - The Neo4j JDBC driver JAR (v6.x bundle / fat jar) is in:
#       F:/OneDrive/_VSCode/MSOSA-Toolbox/ontology/ontop/jdbc/
#     Download from https://github.com/neo4j/neo4j-jdbc/releases — pick the
#     *bundle* / *full* variant that includes shaded dependencies.
#
# SPARQL endpoint will be at http://localhost:8080/sparql
# Web UI (Ontop's YASGUI fork) at http://localhost:8080/

services:
  ontop:
    image: ontop/ontop:5.3.0
    container_name: ontop-uaf
    restart: unless-stopped
    depends_on:
      - neo4j
    ports:
      - "8080:8080"
    environment:
      - ONTOP_MAPPING_FILE=/opt/ontop/input/uaf-spike.obda
      - ONTOP_ONTOLOGY_FILE=/opt/ontop/input/uaf-mvo.ttl
      - ONTOP_PROPERTIES_FILE=/opt/ontop/input/ontop.properties
      - ONTOP_CORS_ALLOWED_ORIGINS=*
      - ONTOP_DEV_MODE=true
    volumes:
      - F:/OneDrive/_VSCode/MSOSA-Toolbox/ontology/ontop:/opt/ontop/input
      - F:/OneDrive/_VSCode/MSOSA-Toolbox/ontology/ontop/jdbc:/opt/ontop/jdbc
