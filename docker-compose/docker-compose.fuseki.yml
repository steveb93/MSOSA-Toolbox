# Overlay: adds Apache Jena Fuseki sidecar as the SPARQL endpoint for the UAF MVO,
# plus a self-hosted WebVOWL container for browsing the OWL T-Box.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.fuseki.yml up -d
#
# Endpoints:
#   SPARQL query : http://localhost:3030/uaf/sparql
#   SPARQL update: http://localhost:3030/uaf/update
#   Fuseki UI    : http://localhost:3030/
#   WebVOWL UI   : http://localhost:${WEBVOWL_PORT:-8080}/  (built from upstream
#                  https://github.com/VisualDataWeb/WebVOWL on first `up`).
#                  Upload ontology/uaf-mvo.ttl (and optionally uaf-mvo-axioms.ttl)
#                  via the WebVOWL "Ontology" menu to render the T-Box.
#
# Refresh data after a Neo4j export:
#   python ontology/codegen/dump_to_rdf.py
#   docker exec fuseki-uaf /jena-fuseki/bin/s-post http://localhost:3030/uaf/data \
#       default /staging/dump/uaf-instance.ttl
# (Or restart the container; the dataset reloads from /staging on startup.)

services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki-uaf
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD:?FUSEKI_ADMIN_PASSWORD must be set in .env}
      - JVM_ARGS=-Xmx1g
    volumes:
      # Relative paths resolve against the compose project directory (docker-compose/).
      # Invoke from docker-compose/ or pass --project-directory docker-compose.
      - ../ontology:/staging:ro
      # Fuseki needs to write back into /fuseki/configuration on startup, so this
      # mount is read-write. Edit ontology/fuseki/configuration/uaf.ttl on the host
      # and restart the container to apply changes.
      - ../ontology/fuseki/configuration:/fuseki/configuration

  webvowl:
    # WebVOWL renders the OWL T-Box (classes, properties, restrictions) as the
    # Visual Notation for OWL Ontologies. Replaces the previous SPARQL→GraphML
    # exporter — no intermediary steps, point a browser at the container.
    #
    # Built from the upstream repo per https://github.com/VisualDataWeb/WebVOWL
    # README ("docker build . -t webvowl:v1"). There is no published Docker Hub
    # image. WEBVOWL_REF pins the build to a git ref (branch / tag / commit) —
    # default `master` matches the upstream README; set to a tag like `1.1.6`
    # in .env to lock to a release. First `up` does the build; cached after.
    build:
      context: https://github.com/VisualDataWeb/WebVOWL.git#${WEBVOWL_REF:-master}
    image: webvowl-uaf:local
    container_name: webvowl-uaf
    restart: unless-stopped
    ports:
      - "${WEBVOWL_PORT:-8080}:8080"
