# NeoDash kiosk-mode overlay — auto-loads the saved "UAF Starter"
# dashboard on connect. Use this INSTEAD of docker-compose.neodash.yml
# (it reuses the same service name, so do not stack the two overlays).
#
# Bootstrap (one-time):
#   1. docker compose -f docker-compose.yml -f docker-compose.neodash.yml up -d
#   2. Open http://localhost:5005/, connect, then either:
#      a. Import viz/neodash/uaf-starter.json via the file-upload icon, OR
#      b. Build it via Path B in viz/neodash/README.md
#   3. Save dashboard to Neo4j with the name "UAF Starter" (header → save icon
#      → Save to Neo4j). It persists as a :_Neodash_Dashboard node.
#   4. docker compose -f docker-compose.yml -f docker-compose.neodash.yml down
#   5. Switch to this overlay:
#      docker compose -f docker-compose.yml -f docker-compose.neodash-kiosk.yml up -d
#
# Open http://localhost:5005/ — NeoDash skips the editor chrome,
# pre-fills the connection form, and loads "UAF Starter" on login.
#
# Security note: the user still types the Neo4j password each session
# (standalonePassword is intentionally NOT baked in). To turn this into
# a true display-wall kiosk with zero login, append
# `standalonePassword=${NEO4J_PASSWORD}` below — but only do that on a
# trusted, network-isolated host. The browser exposes whatever it gets.

services:
  neodash:
    image: neo4jlabs/neodash:latest
    container_name: neodash
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      - ssoEnabled=false
      - standalone=true
      - standaloneProtocol=neo4j
      - standaloneHost=localhost
      - standalonePort=7687
      - standaloneDatabase=neo4j
      - standaloneUsername=neo4j
      - standaloneDashboardName=UAF Starter
      - standaloneDashboardDatabase=neo4j
      - standaloneAllowLoad=false
      - standaloneLoadFromOtherDatabases=false
      - standaloneMultiDatabase=false
