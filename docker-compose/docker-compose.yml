services:
  neo4j:
    # Pinned to 5.26 (LTS-line) because neosemantics 5.26.0 is the latest n10s release
    # and there is no n10s build for the 2026.x calendar-versioned line yet.
    # Track https://github.com/neo4j-labs/neosemantics/releases and bump when a
    # 2026.x build appears.
    image: neo4j:5.26
    container_name: neo4j-docker
    restart: unless-stopped
    ports:
      - "7474:7474" # Neo4j HTTP
      - "7687:7687" # Bolt protocol
      - "7473:7473" # Bloom HTTP
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}
      - NEO4J_PLUGINS=["apoc","apoc-extended", "bloom", "graph-data-science", "genai"]
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      # neosemantics (n10s) — drop neosemantics-<version>.jar into F:/neo4j-docker/plugins manually;
      # it is not in the auto-installable NEO4J_PLUGINS list. See ontology/README for the matching
      # version table. The settings below register the /rdf SPARQL endpoint and unrestrict n10s.*.
      # Neo4j 5.x: setting was renamed from dbms.* to server.* — using the new name.
      - NEO4J_server_unmanaged__extension__classes=n10s.endpoint=/rdf
      - NEO4J_dbms_security_procedures_unrestricted=n10s.*,apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=n10s.*,apoc.*,gds.*
    volumes:
      # Neo4j data lives outside the repo (large + machine-specific). Set
      # NEO4J_DATA_DIR in .env to an absolute host path; the four subdirs are
      # created on first run.
      - ${NEO4J_DATA_DIR:?NEO4J_DATA_DIR must be set in .env}/data:/data
      - ${NEO4J_DATA_DIR}/logs:/logs
      - ${NEO4J_DATA_DIR}/import:/import
      - ${NEO4J_DATA_DIR}/plugins:/plugins