name: Python MCP — Publish to PyPI

# Publishes graph-mcp-driver to PyPI via trusted publishing (OIDC).
# No PyPI API token is stored in this repo — PyPI verifies the OIDC
# token presented by the publish step against the trusted publisher
# configured at https://pypi.org/manage/account/publishing/.
#
# Tag scheme: `mcp-v<version>` (e.g. `mcp-v1.0.0`). Lives independent of
# the MSOSA plugin's `v<version>` tag so plugin releases don't republish
# the MCP server and vice versa.

on:
  push:
    tags: ["mcp-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag-style version (e.g. mcp-v1.0.0) — must match [project].version in pyproject.toml"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Read version from pyproject.toml
        id: get-version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pyproject version: $VERSION"
      - name: Verify tag/dispatch version matches pyproject.toml
        env:
          INPUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          PY="${{ steps.get-version.outputs.version }}"
          BARE="${INPUT_REF#mcp-v}"
          if [ "$PY" != "$BARE" ]; then
            echo "::error::Input/tag '${BARE}' does not match pyproject.toml [project].version '${PY}'. Bump pyproject.toml first."
            exit 1
          fi
      - name: Build sdist + wheel
        run: python -m build
      - name: Twine metadata check
        run: python -m twine check dist/*
      - name: Upload dist artefacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment is a manual-approval gate. Create it under
    # repo Settings → Environments → New environment → name "pypi" and
    # add yourself as a required reviewer. Trusted publishing also keys
    # on this environment name when configured at PyPI.
    environment:
      name: pypi
      url: https://pypi.org/project/graph-mcp-driver/
    permissions:
      # Required for PyPI trusted publishing (OIDC token exchange).
      id-token: write
    steps:
      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
