name: MSOSA Model Exporter — Build & Release

on:
  push:
    branches: ["main", "preview"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "preview"]
    paths:
      - "msosa-model-exporter/**"
      - "msosa-sdk/**"
      - "cypher/**"
  schedule:
    - cron: "0 2 * * *"   # Nightly at 02:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.4.1) — must match the revision property in pom.xml"
        required: true
        type: string
      release_type:
        description: "Release type (informational — used in release title)"
        required: true
        default: minor
        type: choice
        options: [major, minor, patch]
      draft:
        description: "Publish as draft release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  # ── Nightly change guard ──────────────────────────────────────────────────
  # Skipped for all non-schedule events; the build job checks its result.
  check-changes:
    name: Detect nightly changes
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          COUNT=$(git log --oneline --after="$SINCE" -- msosa-model-exporter/ msosa-sdk/ cypher/ | wc -l)
          echo "has_changes=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  # ── Main build ────────────────────────────────────────────────────────────
  build:
    name: Build Plugin
    needs: [check-changes]
    # Skip rebuilds caused by the version-sync bot's own push to a branch — it
    # neither changes source nor needs rebuilding. Branch pushes only:
    # tag pushes must still build even when the tag points at a bot commit,
    # because that's the supported way to cut a release after a bot sync
    # landed at the tip of preview.
    #
    # github.actor on a PAT-authenticated push is the PAT owner, not the bot,
    # so we check the commit *author* which is reliably set by
    # `git config user.name "github-actions[bot]"` in sync-version-refs.
    if: |
      always() &&
      !(github.event_name == 'push' &&
        startsWith(github.ref, 'refs/heads/') &&
        github.event.head_commit.author.name == 'github-actions[bot]') &&
      needs.check-changes.result != 'failure' &&
      (needs.check-changes.result == 'skipped' ||
       needs.check-changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: msosa-model-exporter
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven
          cache-dependency-path: msosa-model-exporter/pom.xml
      - name: Install API jars
        shell: pwsh
        run: ./install-msosa-jars.ps1
      - name: Build Plugin
        run: mvn clean package
      - name: Get version from pom.xml
        id: get-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Verify dispatch version matches pom.xml
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          POM=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BARE="${INPUT_VERSION#v}"
          if [ "$POM" != "$BARE" ]; then
            echo "::error::Input version '${BARE}' does not match pom.xml '${POM}'. Update the revision property first."
            exit 1
          fi
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4
        with:
          directory: msosa-model-exporter
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: msosa-model-exporter/target/msosa-model-exporter-*-plugin.zip
          retention-days: 7

  # ── Version reference sync ────────────────────────────────────────────────
  # Rewrites hardcoded version strings in *.md to match the published tag.
  # On publish (tag push or dispatch) the tag name is the canonical version.
  # On plain branch pushes it falls back to the pom.xml version.
  #
  # Loop prevention: the bot pushes back to preview/main using a PAT, which
  # means github.actor on the resulting workflow run is the PAT owner, NOT
  # 'github-actions[bot]'. The actor-guard alone is therefore insufficient.
  # We filter on the COMMIT AUTHOR (set via `git config user.name` to
  # 'github-actions[bot]' in this job) which is reliable regardless of which
  # token did the push.
  #
  # Do NOT add `[skip ci]` to the bot's commit message — GitHub treats [skip ci]
  # as a hard skip on tag pushes too, silently blocking the release pipeline
  # when the bot's commit ends up at the tip of preview and a tag is then
  # pushed (this was the v1.3.1-Preview release that didn't fire).
  sync-version-refs:
    name: Sync version references in docs
    needs: [build, verify-tag-branch]
    # Branch-push arm carries the author filter — that's the only event type
    # that can be self-triggered by the bot. Tag pushes and workflow_dispatch
    # are always operator-initiated, so they're unconditionally allowed.
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.verify-tag-branch.result == 'success' || needs.verify-tag-branch.result == 'skipped') &&
      (
        (github.event_name == 'push' &&
         (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preview') &&
         github.event.head_commit.author.name != 'github-actions[bot]') ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version and target branch
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            V="${{ inputs.version }}"; VERSION="${V#v}"
            BRANCH="${GITHUB_REF_NAME}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            BRANCH="$([[ "${GITHUB_REF_NAME}" == *-Preview ]] && echo preview || echo main)"
          else
            VERSION="${{ needs.build.outputs.version }}"
            BRANCH="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"   >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.branch }}
          token: ${{ secrets.BOT_PAT }}
      - name: Replace version strings in markdown
        run: |
          # Consume the optional -Preview suffix in the match (note the `(-Preview)*`)
          # so the replacement collapses any existing suffix chain back to a single
          # `-Preview` (or none, when VERSION is a stable). Without this the
          # replacement appended `-Preview` on top of whatever was already there,
          # growing the jar/zip filenames by one suffix per push.
          VERSION="${{ steps.resolve.outputs.version }}"
          find . -name "*.md" -not -path "./.git/*" -exec sed -i \
            -E "s|msosa-model-exporter-[0-9]+\.[0-9]+\.[0-9]+(-Preview)*|msosa-model-exporter-${VERSION}|g" {} +
      - name: Commit if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && exit 0
          git add -A
          git commit -m "chore: sync version references to ${{ steps.resolve.outputs.version }}"
          git push

  # ── Tag branch guard ──────────────────────────────────────────────────────
  verify-tag-branch:
    name: Verify tag is on correct branch
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check branch
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-Preview ]]; then
            EXPECTED="origin/preview"
          else
            EXPECTED="origin/main"
          fi
          if git branch -r --contains "${GITHUB_SHA}" | grep -qE "^[[:space:]]*${EXPECTED}[[:space:]]*$"; then
            echo "Tag ${GITHUB_REF_NAME} verified on ${EXPECTED}"
          else
            echo "::error::Tag ${GITHUB_REF_NAME} must originate from ${EXPECTED}. Preview tags from 'preview', release tags from 'main'."
            exit 1
          fi
      - name: Check pom.xml revision matches tag stability
        shell: bash
        run: |
          POM=$(grep -oP '(?<=<revision>)[^<]+' msosa-model-exporter/pom.xml)
          if [[ "${GITHUB_REF_NAME}" == *-Preview ]]; then
            if [[ "$POM" != *-Preview ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} is a Preview but pom.xml <revision> is '${POM}' (no -Preview suffix). Bump revision to '${POM}-Preview' before tagging."
              exit 1
            fi
          else
            if [[ "$POM" == *-Preview ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} is a stable release but pom.xml <revision> is '${POM}'. Bump revision to '${POM%-Preview}' (drop -Preview) before tagging, otherwise the built zip will be named *-Preview-plugin.zip."
              exit 1
            fi
          fi
          echo "pom.xml <revision>=${POM} matches tag ${GITHUB_REF_NAME}"

  # ── Release ───────────────────────────────────────────────────────────────
  # Runs on: pushed tag (always draft) or workflow_dispatch (draft = input).
  # Major vs minor distinction is captured in the release_type input label.
  release:
    name: Publish Release
    needs: [build, verify-tag-branch]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.verify-tag-branch.result == 'success' ||
       needs.verify-tag-branch.result == 'skipped') &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip
          path: dist
      - name: Resolve release parameters
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version }}"
            TYPE="${{ inputs.release_type }}"
            IS_DRAFT="${{ inputs.draft }}"
            IS_PRERELEASE="false"
          else
            TAG="${GITHUB_REF_NAME}"
            IS_DRAFT="true"
            IS_PRERELEASE="${{ contains(github.ref, '-Preview') }}"
            BARE="${GITHUB_REF_NAME#v}"
            MINOR=$(echo "$BARE" | cut -d. -f2)
            PATCH=$(echo "$BARE" | cut -d. -f3 | sed 's/-.*//')
            if   [ "$MINOR" -eq 0 ] && [ "$PATCH" -eq 0 ]; then TYPE="major"
            elif [ "$PATCH" -eq 0 ];                        then TYPE="minor"
            else                                                 TYPE="patch"
            fi
          fi
          echo "tag=$TAG"                     >> "$GITHUB_OUTPUT"
          echo "name=${TAG} (${TYPE})"        >> "$GITHUB_OUTPUT"
          echo "is_draft=$IS_DRAFT"           >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.params.outputs.tag }}
          name: ${{ steps.params.outputs.name }}
          files: dist/*.zip
          generate_release_notes: true
          draft: ${{ steps.params.outputs.is_draft }}
          prerelease: ${{ steps.params.outputs.is_prerelease }}
